# ═══════════════════════════════════════════════════════════════
#  Publish the Boogle Runner image to GHCR (Stage 11 Phase 3)
#
#  Builds _Boogle/Dockerfile and pushes to
#  ghcr.io/<owner>/boogle-runner — the image the dashboard's
#  Settings → Runner deploy command pulls.
#
#  Triggers:
#    • push to main        → :latest + :sha-<short>
#    • push of a v* tag    → :latest + :<version> (e.g. v0.5.0 → 0.5.0)
#    • manual dispatch
#
#  No secrets needed: GITHUB_TOKEN is auto-provisioned with
#  packages:write. Build is linux/amd64 to match most cloud hosts
#  (and so ffmpeg-static fetches the Linux ffmpeg binary).
# ═══════════════════════════════════════════════════════════════
name: publish-runner

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/boogle-runner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
